services:
  app:
    build: .
    container_name: kodez-checkmate-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3005"
    env_file:
      - .env
    environment:
      # Prefer an externally supplied DATABASE_URL; otherwise fall back to the local db container.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-checkmate}:${POSTGRES_PASSWORD:-checkmate}@db:5432/${POSTGRES_DB:-checkmate}}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist downloaded report files across container restarts
      - reports_data:/app/reports

  db:
    image: postgres:16-alpine
    container_name: kodez-checkmate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkmate}
      POSTGRES_DB: ${POSTGRES_DB:-checkmate}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkmate} -d ${POSTGRES_DB:-checkmate}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  reports_data:
