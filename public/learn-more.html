<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kodez CheckMate — Learn More</title>
<link rel="icon" type="image/svg+xml" href="/branding/kodez_logo.svg" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #111111;
    --white: #ffffff;
    --brand: #ff7f56;
    --grey4: #888888;
    --grey5: #555555;
    --transition: 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    overflow: hidden;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* TOP BAR */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(10, 11, 13, .85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,.07);
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
  .logo-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; color: #e8eaf0; letter-spacing: .01em; }
  .logo-sub { font-family: 'Inter', sans-serif; font-size: 10px; color: #6b7280; letter-spacing: .03em; text-transform: uppercase; }
  #slide-title { display: none; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .hackathon-label {
    padding: 5px 12px;
    background: rgba(255, 127, 86, .08);
    border: 1px solid rgba(255, 127, 86, .3);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    color: #ff7f56;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .03em;
  }
  .badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px;
    background: rgba(255, 127, 86, .15);
    border: 1px solid #ff7f56;
    border-radius: 20px;
    color: #ff7f56;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 600;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff7f56; box-shadow: 0 0 6px #ff7f56; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  .counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--grey4); letter-spacing: 0.05em;
  }
  .counter em { color: var(--brand); font-style: normal; font-weight: 800; }
  #fs-btn {
    width: 30px; height: 30px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--grey4);
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }
  #fs-btn:hover { border-color: var(--brand); background: rgba(255,127,86,0.1); color: var(--brand); }
  #fs-btn svg { width: 13px; height: 13px; }
  .top-blog-link {
    display: inline-flex; align-items: center;
    padding: 5px 14px;
    background: rgba(255, 127, 86, .15);
    border: 1px solid #ff7f56;
    border-radius: 20px;
    color: #ff7f56;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 600;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    transition: all .2s;
  }
  .top-blog-link:hover { color: #ffd7ca; border-color: #ff7f56; background: rgba(255, 127, 86, .25); box-shadow: 0 0 14px rgba(255,127,86,.25); }

  /* PROGRESS BAR */
  #progress {
    position: absolute;
    top: 0; left: 0; height: 2px;
    background: var(--brand);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 20;
  }

  /* STAGE */
  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 18px 76px;
  }

  /* Click zones */
  .click-zone {
    position: absolute; top: 0; bottom: 0; width: 76px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5;
    transition: background 0.2s;
  }
  .click-zone:hover { background: rgba(255,255,255,0.025); }
  #prev-zone { left: 0; }
  #next-zone { right: 0; }

  .nav-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.1);
    color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s, transform 0.15s;
  }
  .nav-btn:hover { border-color: var(--brand); background: rgba(255,127,86,0.22); color: var(--brand); transform: scale(1.08); }
  .nav-btn:active { transform: scale(0.94); }
  .nav-btn svg { width: 15px; height: 15px; }
  .nav-btn.disabled { opacity: 0.2; pointer-events: none; }

  /* CAROUSEL */
  #carousel {
    position: relative;
    width: 100%;
    max-width: 1100px;
    aspect-ratio: 16/9;
    overflow: hidden;
    border-radius: 5px;
    box-shadow: 0 28px 72px rgba(0,0,0,0.72), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transform: translateX(48px);
    transition: opacity var(--transition), transform var(--transition);
    pointer-events: none;
  }
  .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .slide.exit-left { opacity: 0; transform: translateX(-48px); pointer-events: none; }
  .slide.go-back { transform: translateX(-48px); }
  .slide img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 5px; }

  /* KEYBOARD HINT */
  #kb-hint {
    position: absolute; bottom: 70px; right: 28px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    transition: opacity 0.8s;
  }
  #kb-hint.hidden { opacity: 0; }

  /* BOTTOM BAR */
  #bottombar {
    flex-shrink: 0; height: 56px;
    background: rgba(17,17,17,0.97);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 0 28px;
  }
  .pip {
    height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.16);
    cursor: pointer; width: 26px;
    transition: background 0.25s, width 0.32s cubic-bezier(0.4,0,0.2,1), transform 0.2s;
  }
  .pip:hover { background: rgba(255,127,86,0.45); transform: scaleY(1.8); }
  .pip.active { background: var(--brand); width: 50px; }
</style>
</head>

];
const TITLES = ['Cover', 'The Challenge', 'What is CheckMate', 'How it Works', 'Core Capabilities', 'Integrations', 'Security Architecture', 'Why it Matters', 'Get Started'];

let current = 0;
const total = SLIDES.length;
const carousel = document.getElementById('carousel');
const bottombar = document.getElementById('bottombar');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const prevZone = document.getElementById('prev-zone');
const nextZone = document.getElementById('next-zone');
const curNum = document.getElementById('cur-num');
const slideTitle = document.getElementById('slide-title');
const progress = document.getElementById('progress');
const kbHint = document.getElementById('kb-hint');

// Build slide elements
const slideEls = SLIDES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = src;
  img.alt = TITLES[i];
  img.draggable = false;
  div.appendChild(img);
  carousel.appendChild(div);
  return div;
});

// Build pip dots
const pipEls = TITLES.map((t, i) => {
  const pip = document.createElement('div');
  pip.className = 'pip' + (i === 0 ? ' active' : '');
  pip.title = t;
  pip.addEventListener('click', () => goTo(i));
  bottombar.appendChild(pip);
  return pip;
});

function goTo(index) {
  if (index === current || index < 0 || index >= total) return;
  const backward = index < current;
  const prev = current;
  current = index;

  // Set exit direction
  slideEls[prev].style.transition = 'opacity var(--transition), transform var(--transition)';
  slideEls[prev].style.opacity = '0';
  slideEls[prev].style.transform = backward ? 'translateX(48px)' : 'translateX(-48px)';
  slideEls[prev].style.pointerEvents = 'none';

  // Prep incoming from correct side
  slideEls[current].style.transition = 'none';
  slideEls[current].style.transform = backward ? 'translateX(-48px)' : 'translateX(48px)';
  slideEls[current].style.opacity = '0';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      slideEls[current].style.transition = 'opacity var(--transition), transform var(--transition)';
      slideEls[current].style.opacity = '1';
      slideEls[current].style.transform = 'translateX(0)';
      slideEls[current].style.pointerEvents = 'auto';
    });
  });

  setTimeout(() => {
    slideEls[prev].style.transform = '';
  }, 480);

  pipEls.forEach((p, i) => p.classList.toggle('active', i === current));
  curNum.textContent = current + 1;
  slideTitle.textContent = TITLES[current];
  progress.style.width = ((current + 1) / total * 100) + '%';
  prevBtn.classList.toggle('disabled', current === 0);
  nextBtn.classList.toggle('disabled', current === total - 1);
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

prevBtn.addEventListener('click', e => { e.stopPropagation(); prev(); });
nextBtn.addEventListener('click', e => { e.stopPropagation(); next(); });
prevZone.addEventListener('click', prev);
nextZone.addEventListener('click', next);

document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown',' '].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft','ArrowUp'].includes(e.key)) { e.preventDefault(); prev(); }
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(total - 1);
});

// Touch swipe
let tx = 0;
carousel.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
carousel.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
});

// Fullscreen
document.getElementById('fs-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});

// Hide hint
setTimeout(() => kbHint.classList.add('hidden'), 5000);
document.addEventListener('keydown', () => kbHint.classList.add('hidden'), {once:true});
document.addEventListener('click', () => kbHint.classList.add('hidden'), {once:true});

// Init
progress.style.width = (1 / total * 100) + '%';
</script>
